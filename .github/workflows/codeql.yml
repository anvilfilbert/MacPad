name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "31 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Swift
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Build for analysis
        run: xcodebuild -scheme MacPad -destination 'platform=macOS,arch=arm64' -configuration Release -derivedDataPath .build/xcode-derived-data build CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
